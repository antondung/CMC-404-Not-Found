# =========================================================
# Data Platform stack - Neo4j + PostgreSQL + Qdrant + Redis + MinIO
# Chạy:  docker compose -f Data/docker-compose.data.yml --env-file Data/.env up -d
# Tiêu chí Done: stack healthy trong <= 3 phút máy dev.
# =========================================================

name: legal-kg-data

services:
  # ---------- Neo4j: Knowledge Graph (source of truth citation) ----------
  neo4j:
    image: neo4j:5-community
    container_name: legal_neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/change_me_neo4j}
      NEO4J_server_memory_pagecache_size: 512m
      NEO4J_server_memory_heap_max__size: 1G
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./backups/neo4j:/backups
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  # ---------- PostgreSQL: meta vận hành ----------
  postgres:
    image: postgres:16
    container_name: legal_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app_be_rw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_pg}
      POSTGRES_DB: ${POSTGRES_DB:-legal_kg}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Auto-apply migrations lần đầu khởi tạo (chạy theo thứ tự tên file)
      - ./schema/postgres:/docker-entrypoint-initdb.d:ro
      - ./backups/postgres:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app_be_rw} -d ${POSTGRES_DB:-legal_kg}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ---------- Qdrant: vector retrieve ----------
  qdrant:
    image: qdrant/qdrant:latest
    container_name: legal_qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
      - ./backups/qdrant:/qdrant/snapshots
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ---------- Redis: queue + cache ----------
  redis:
    image: redis:7-alpine
    container_name: legal_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ---------- MinIO: object store PDF/DOCX/HTML ----------
  minio:
    image: minio/minio:latest
    container_name: legal_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change_me_minio}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ---------- MinIO init: tạo bucket legal-raw / social-raw ----------
  minio-init:
    image: minio/mc:latest
    container_name: legal_minio_init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change_me_minio}
      MINIO_BUCKET_LEGAL: ${MINIO_BUCKET_LEGAL:-legal-raw}
      MINIO_BUCKET_SOCIAL: ${MINIO_BUCKET_SOCIAL:-social-raw}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb -p local/$$MINIO_BUCKET_LEGAL || true;
      mc mb -p local/$$MINIO_BUCKET_SOCIAL || true;
      mc version enable local/$$MINIO_BUCKET_LEGAL || true;
      mc version enable local/$$MINIO_BUCKET_SOCIAL || true;
      echo 'MinIO buckets ready (versioning enabled)';
      "
    restart: "no"

volumes:
  neo4j_data:
  neo4j_logs:
  postgres_data:
  qdrant_data:
  redis_data:
  minio_data:
